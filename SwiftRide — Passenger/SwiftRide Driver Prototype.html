<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>SwiftRide · Driver</title>
<link rel="stylesheet" href="shared/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* Driver screen switcher — mid-left so it doesn't clash with passenger (top-left)
     or admin (top-right). Blue accent because Driver uses the blue identity. */
  .driver-switcher {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: var(--sr-surface); border: 1px solid var(--sr-line);
    border-radius: var(--sr-r-3); padding: 6px;
    box-shadow: var(--sr-shadow-2);
    display: flex; gap: 2px; align-items: center;
    font-family: var(--sr-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .driver-switcher__label { padding: 6px 10px; color: var(--sr-ink-4); }
  .driver-switcher__btn {
    padding: 6px 12px; background: transparent; border: none; border-radius: var(--sr-r-2);
    font: inherit; color: var(--sr-ink-3); cursor: pointer;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .driver-switcher__btn:hover { color: var(--sr-ink); background: var(--sr-surface-2); }
  .driver-switcher__btn.is-active { background: #1B4C9A; color: white; }

  /* Typography modes — match the other two prototypes for consistency */
  body[data-type-mode="editorial"] {
    --sr-serif: 'Fraunces', 'Newsreader', Georgia, serif;
    --sr-sans:  'Geist', ui-sans-serif, system-ui, sans-serif;
    --sr-mono:  'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  body[data-type-mode="editorial"] .sr-italic { font-family: 'Instrument Serif', 'Fraunces', serif; }
  body[data-type-mode="simpler"] {
    --sr-serif: 'Source Serif 4', Georgia, serif;
    --sr-sans:  'Geist', ui-sans-serif, system-ui, sans-serif;
    --sr-mono:  'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  body[data-type-mode="simpler"] .sr-italic { font-family: inherit; font-style: italic; }
  body[data-type-mode="minimal"] {
    --sr-serif: 'Inter Tight', ui-sans-serif, system-ui, sans-serif;
    --sr-sans:  'Inter Tight', ui-sans-serif, system-ui, sans-serif;
    --sr-mono:  'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  body[data-type-mode="minimal"] .sr-italic { font-family: inherit; font-style: italic; font-weight: 500; }

  @media (max-width: 900px) {
    .driver-switcher { top: 8px; padding: 3px; gap: 0; }
    .driver-switcher__label { display: none; }
    .driver-switcher__btn { padding: 5px 8px; font-size: 10px; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="shared/components.jsx"></script>
<script type="text/babel" src="screens/driver-shell.jsx"></script>
<script type="text/babel" src="screens/driver-dashboard.jsx"></script>
<script type="text/babel" src="screens/driver-active-trip.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "typeMode": "editorial",
  "startRoute": "dashboard"
}/*EDITMODE-END*/;

const App = () => {
  const saved = (typeof localStorage !== 'undefined' && localStorage.getItem('sr-driver-route')) || DEFAULTS.startRoute;
  const initial = (window.location.hash || `#${saved}`).replace('#','');

  const routes = {
    'dashboard': {
      label: 'Dashboard',
      node: <DriverDashboardScreen onAccept={() => (window.location.hash = 'trip')} />,
    },
    'trip': {
      label: 'Active trip',
      node: <DriverActiveTripScreen onComplete={() => (window.location.hash = 'dashboard')} />,
    },
  };

  const [route, setRoute] = useState(routes[initial] ? initial : 'dashboard');

  const savedType = (typeof localStorage !== 'undefined' && localStorage.getItem('sr-type-mode')) || DEFAULTS.typeMode;
  const [typeMode] = useState(savedType);
  useEffect(() => { document.body.setAttribute('data-type-mode', typeMode); }, [typeMode]);

  useEffect(() => {
    const onHash = () => {
      const r = window.location.hash.replace('#','') || 'dashboard';
      if (routes[r]) {
        setRoute(r);
        try { localStorage.setItem('sr-driver-route', r); } catch {}
      }
    };
    window.addEventListener('hashchange', onHash);
    if (!window.location.hash) window.location.hash = route;
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const go = (r) => { window.location.hash = r; };

  return (
    <>
      <div className="driver-switcher no-print">
        <span className="driver-switcher__label">Driver · Shift</span>
        {Object.entries(routes).map(([k, v]) => (
          <button
            key={k}
            className={`driver-switcher__btn ${route === k ? 'is-active' : ''}`}
            onClick={() => go(k)}
          >{v.label}</button>
        ))}
      </div>

      <div data-screen-label={`Driver · ${routes[route].label}`}>
        {routes[route].node}
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
